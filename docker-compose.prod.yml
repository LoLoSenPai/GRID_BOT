services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NODE_ENV: production
        APP_URL: ${APP_URL}
        DATABASE_URL: ${DATABASE_URL}
        ADMIN_USERNAME: ${ADMIN_USERNAME}
        ADMIN_PASSWORD: ${ADMIN_PASSWORD}
        SESSION_SECRET: ${SESSION_SECRET}
        DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
        LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED}
        DEFAULT_CLUSTER: ${DEFAULT_CLUSTER}
        RPC_HTTP_URL: ${RPC_HTTP_URL}
        RPC_WS_URL: ${RPC_WS_URL}
        EXECUTION_WALLET_SECRET_KEY_PATH: /run/secrets/execution-wallet.json
        JUPITER_API_KEY: ${JUPITER_API_KEY}
        PYTH_HERMES_BASE_URL: ${PYTH_HERMES_BASE_URL}
        PYTH_HISTORY_BASE_URL: ${PYTH_HISTORY_BASE_URL}
        BOT_TICK_INTERVAL_MS: ${BOT_TICK_INTERVAL_MS}
        PRICE_STALE_AFTER_MS: ${PRICE_STALE_AFTER_MS}
    restart: "no"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      EXECUTION_WALLET_SECRET_KEY_PATH: /run/secrets/execution-wallet.json
    command: ["pnpm", "db:deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${EXECUTION_WALLET_HOST_PATH}:/run/secrets/execution-wallet.json:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NODE_ENV: production
        APP_URL: ${APP_URL}
        DATABASE_URL: ${DATABASE_URL}
        ADMIN_USERNAME: ${ADMIN_USERNAME}
        ADMIN_PASSWORD: ${ADMIN_PASSWORD}
        SESSION_SECRET: ${SESSION_SECRET}
        DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
        LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED}
        DEFAULT_CLUSTER: ${DEFAULT_CLUSTER}
        RPC_HTTP_URL: ${RPC_HTTP_URL}
        RPC_WS_URL: ${RPC_WS_URL}
        EXECUTION_WALLET_SECRET_KEY_PATH: /run/secrets/execution-wallet.json
        JUPITER_API_KEY: ${JUPITER_API_KEY}
        PYTH_HERMES_BASE_URL: ${PYTH_HERMES_BASE_URL}
        PYTH_HISTORY_BASE_URL: ${PYTH_HISTORY_BASE_URL}
        BOT_TICK_INTERVAL_MS: ${BOT_TICK_INTERVAL_MS}
        PRICE_STALE_AFTER_MS: ${PRICE_STALE_AFTER_MS}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      EXECUTION_WALLET_SECRET_KEY_PATH: /run/secrets/execution-wallet.json
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ${EXECUTION_WALLET_HOST_PATH}:/run/secrets/execution-wallet.json:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/login',{cache:'no-store'}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      EXECUTION_WALLET_SECRET_KEY_PATH: /run/secrets/execution-wallet.json
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ${EXECUTION_WALLET_HOST_PATH}:/run/secrets/execution-wallet.json:ro

volumes:
  postgres_data:
