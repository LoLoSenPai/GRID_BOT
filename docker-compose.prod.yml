services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: "no"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      EXECUTION_WALLET_SECRET_KEY_PATH: /run/secrets/execution-wallet.json
    command: ["pnpm", "db:deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${EXECUTION_WALLET_HOST_PATH}:/run/secrets/execution-wallet.json:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      EXECUTION_WALLET_SECRET_KEY_PATH: /run/secrets/execution-wallet.json
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - ${EXECUTION_WALLET_HOST_PATH}:/run/secrets/execution-wallet.json:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/login',{cache:'no-store'}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      EXECUTION_WALLET_SECRET_KEY_PATH: /run/secrets/execution-wallet.json
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ${EXECUTION_WALLET_HOST_PATH}:/run/secrets/execution-wallet.json:ro

volumes:
  postgres_data:
